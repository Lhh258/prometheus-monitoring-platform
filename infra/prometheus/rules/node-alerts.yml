groups:
  - name: node-alerts
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 80
        for: 1m

        labels:
          severity: warning

        annotations:
          summary: "CPU使用率过高"
          description: "CPU持续超过80%"
